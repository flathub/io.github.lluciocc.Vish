app-id: io.github.lluciocc.Vish
runtime: org.kde.Platform
runtime-version: "6.10"
sdk: org.kde.Sdk
base: io.qt.PySide.BaseApp
base-version: "6.10"
command: vish

finish-args:
  - --share=network
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri

modules:
